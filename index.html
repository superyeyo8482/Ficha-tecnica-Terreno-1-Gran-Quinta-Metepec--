                if (window.Chart) window.Chart.register(ChartDataLabels);

                    </div>

                    {/* Gráficos de comparación */}
                    <div className="bg-white p-5 rounded-2xl mb-5">
                        <h3 className="text-lg font-bold mb-2">📊 Comparativa de Fraccionamientos</h3>
                        <div className="chart-container"><canvas id="bubbleChart"></canvas></div>
                        <p className="text-xs text-gray-500 mt-2">Tamaño de burbuja = plusvalía proyectada. Gran Quinta (naranja) ofrece el mejor equilibrio precio/calidad.</p>
                    </div>
                    <div className="bg-white p-5 rounded-2xl mb-5">
                        <h3 className="text-lg font-bold mb-2">🕸️ Ventaja por Ubicación</h3>
                        <div className="chart-container"><canvas id="radarChart"></canvas></div>
                        <p className="text-xs text-gray-500 mt-2">Gran Quinta supera al promedio de otros fraccionamientos en todos los factores clave.</p>
                    </div>
                    <div className="bg-white p-5 rounded-2xl mb-5">
                        <h3 className="text-lg font-bold mb-2">📈 Tendencia de Precios en Metepec</h3>
                        <div className="chart-container"><canvas id="priceChart"></canvas></div>
                        <p className="text-xs text-gray-500 mt-2">Fuente: Índice SHF de Precios de la Vivienda.</p>
                    </div>

                    {/* Documentos de respaldo */}
                    <div className="bg-gray-50 p-5 rounded-2xl mb-5 border border-gray-200">
                        <h3 className="text-lg font-bold mb-3 text-center">📚 Documentos de Respaldo</h3>
                        <div className="grid grid-cols-1 gap-3">
                            <a href="./An%C3%A1lisis_Financiero_detallado_Gran_Quinta_Metepec__Estado_de_Mexico%20(2).pdf" download className="btn-pdf justify-center">📄 Proyección 2A – Venta del Terreno</a>
                            <a href="./An%C3%A1lisis_Financiero_detallado_Construyendo_y_Vendiendo%20(1).pdf" download className="btn-pdf justify-center">📄 Proyección 2B – Construcción y Venta</a>
                            <a href="./An%C3%A1lisis_Financiero_detallado_Construyendo_y_Rentando%20(1).pdf" download className="btn-pdf justify-center">📄 Proyección 2C – Construcción y Renta</a>
                            <a href="./Anexo_T%C3%A9cnico_Gran_Quinta_Metepec_Estado_de_MExico.pdf" download className="btn-pdf justify-center">📄 Anexo Técnico de Construcción</a>
                            <a href="./Indice_de_Certeza_de_Invercion_ICI%20(1).pdf" download className="btn-pdf justify-center">📄 Metodología del ICI</a>
                        </div>
                    </div>

                    {/* Contactos */}
                    <div className="bg-teal-900 p-6 rounded-3xl text-white text-center mb-5">
                        <h3 className="text-2xl font-bold mb-2">📞 ¿Listo para invertir?</h3>
                        <p className="text-sm mb-4 opacity-90">Asesoría personalizada sin costo</p>
                        <div className="contact-grid">
                            <div>
                                <a href={advisor.waLink} target="_blank" className="btn-whatsapp btn-whatsapp-1" onClick={ocultarPersonaje}>
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="white"><path d="M12.04 2C6.58 2 2.13 6.45 2.13 11.91C2.13 13.66 2.59 15.36 3.45 16.86L2.05 21L6.3 19.66C7.75 20.45 9.38 20.87 11.04 20.87H11.04C16.5 20.87 20.95 16.42 20.95 10.96C20.95 5.5 16.5 2 12.04 2Z"/></svg>
                                    Aurelio Robles
                                </a>
                                <p className="text-[10px] mt-1 opacity-80">Broker & Advisor</p>
                            </div>
                        </div>
                        <p className="text-xs mt-4 border-t border-white/20 pt-4">⚡ Respuesta rápida • Atención personalizada</p>
                    </div>

                    {/* Personaje Inver-tito */}
                    {mostrarPersonaje && (
                        <div className="inver-tito">
                            <div className="burbuja">{mensaje}</div>
                            <svg viewBox="0 0 120 120" fill="none" width="100" height="100">
                                <rect x="40" y="50" width="40" height="40" rx="8" fill="#F59E0B" />
                                <polygon points="30,50 60,30 90,50" fill="#B45309" />
                                <circle cx="60" cy="70" r="6" fill="white" /><circle cx="60" cy="70" r="3" fill="#0F172A" />
                                <g className="brazo"><rect x="75" y="65" width="25" height="6" rx="3" fill="#F59E0B" transform="rotate(15, 80, 70)" /><circle cx="98" cy="60" r="5" fill="#F59E0B" /></g>
                                <circle cx="45" cy="92" r="5" fill="#4B5563" /><circle cx="75" cy="92" r="5" fill="#4B5563" />
                            </svg>
                        </div>
                    )}

                    {/* Footer */}
                    <div className="text-center text-gray-400 text-[10px] py-2">
                        <p>Fuentes: SHF, AMPI, Inmuebles24, Vivanuncios. Proyecciones basadas en datos de mercado 2026.</p>
                        <p>© 2026 Robles Ecosystem – Premium real estate intelligence</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
