<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Gran Quinta Lote 1 - Inversión Segura</title>
    
    <!-- Librerías -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #FDFBF7; margin: 0; padding: 0; }
        .cargando { display: flex; justify-content: center; align-items: center; height: 100vh; }
        .chart-container { position: relative; width: 100%; height: 280px; margin: 20px 0; }
        @media (min-width: 768px) { .chart-container { height: 320px; } }
        img { width: 100%; height: 100%; object-fit: cover; border-radius: inherit; }
        .video-container { position: relative; width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 20px; overflow: hidden; }
        .badge { background: #F59E0B; color: white; padding: 5px 15px; border-radius: 50px; font-size: 12px; font-weight: bold; display: inline-block; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="root">
        <div class="cargando">Cargando experiencia inmersiva...</div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [cargado, setCargado] = useState(false);
            const [isPlaying, setIsPlaying] = useState(false);
            const videoRef = useRef(null);
            const chartTendencia = useRef(null);
            const chartBurbujas = useRef(null);
            const chartRadar = useRef(null);

            const baseUrl = "https://raw.githubusercontent.com/superyeyo8482/Ficha-tecnica-Terreno-1-Gran-Quinta-Metepec--/main/";

            // ============================================
            // NOMBRES DE ARCHIVO EXACTOS
            // ============================================
            const images = {
                hero: "imagen%206%20(entrada%20principal).jpg",
                aerial: "imagen%208%20(gran%20quinta%20vista%20desdde%20arriba).jpg",
                clubHouse: "imagen%207%20(casa%20club).jpg",
                greenAreas: "imagen%205%20(areas%20verdes).webp",
                street: "imagen%202%20(%20calle%20y%20casas).webp",
                house1: "imagen%201%20(casa).webp",
                house2: "imagen%203%20(casa2).webp",
            };

            // ============================================
            // DATOS DE FRACCIONAMIENTOS
            // ============================================
            const fraccionamientos = [
                { nombre: "Gran Quinta (Lote 1)", precio: 11500, puntaje: 94, plusvalia: 14, color: "#F59E0B", link: "https://www.google.com/search?q=Gran+Quinta+Metepec" },
                { nombre: "Condado del Valle", precio: 12400, puntaje: 78, plusvalia: 11, color: "#1E1B4B", link: "https://www.google.com/search?q=Condado+del+Valle+Metepec" },
                { nombre: "Villas de San José", precio: 10800, puntaje: 62, plusvalia: 8, color: "#64748B", link: "https://www.google.com/search?q=Villas+de+San+José+Metepec" },
                { nombre: "Los Pilares", precio: 11200, puntaje: 70, plusvalia: 10, color: "#64748B", link: "https://www.google.com/search?q=Los+Pilares+Metepec" },
                { nombre: "Hípico Residencial", precio: 13500, puntaje: 85, plusvalia: 12, color: "#64748B", link: "https://www.google.com/search?q=Hípico+Residencial+Metepec" },
                { nombre: "Paseos del Valle", precio: 9500, puntaje: 48, plusvalia: 5, color: "#64748B", link: "https://www.google.com/search?q=Paseos+del+Valle+Metepec" }
            ];

            // ============================================
            // INICIALIZACIÓN DE GRÁFICAS
            // ============================================
            const initChart = (id, ref, createFn) => {
                const canvas = document.getElementById(id);
                if (canvas && !ref.current) {
                    try {
                        const ctx = canvas.getContext('2d');
                        if (ctx) ref.current = createFn(ctx);
                    } catch (error) { console.error(`Error en gráfico ${id}:`, error); }
                }
            };

            useEffect(() => {
                setCargado(true);
                if (Chart) Chart.register(ChartDataLabels);

                setTimeout(() => {
                    // Gráfico de Tendencia
                    initChart('chartTendencia', chartTendencia, (ctx) => new Chart(ctx, {
                        type: 'line',
                        data: {
                            labels: ['2021', '2022', '2023', '2024', '2025', '2026'],
                            datasets: [{
                                label: 'Precio zona Metepec ($/m²)',
                                data: [8500, 9200, 10500, 11800, 12500, 13800],
                                borderColor: '#1E1B4B',
                                backgroundColor: 'rgba(30,27,75,0.1)',
                                tension: 0.4
                            }]
                        },
                        options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } } }
                    }));

                    // Gráfico de Burbujas
                    initChart('chartBurbujas', chartBurbujas, (ctx) => new Chart(ctx, {
                        type: 'bubble',
                        data: {
                            datasets: [{
                                data: fraccionamientos.map(f => ({ x: f.precio, y: f.puntaje, r: f.plusvalia * 1.2 })),
                                backgroundColor: fraccionamientos.map(f => f.color),
                                borderColor: 'white', borderWidth: 2
                            }]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            plugins: {
                                legend: { display: false },
                                tooltip: { callbacks: { label: (ctx) => { const f = fraccionamientos[ctx.dataIndex]; return [`${f.nombre}`, `Precio: $${f.precio}/m²`, `Puntaje: ${f.puntaje}/100`, `Plusvalía: +${f.plusvalia}%`]; } } },
                                datalabels: {
                                    display: true, align: 'top', offset: 10, color: '#0F172A', font: { weight: 'bold', size: 9 },
                                    formatter: (value, ctx) => fraccionamientos[ctx.dataIndex].nombre.split(' ')[0]
                                }
                            },
                            scales: {
                                x: { title: { display: true, text: 'Precio por m² (MXN)' }, ticks: { callback: v => '$' + v/1000 + 'k' } },
                                y: { title: { display: true, text: 'Puntaje Ubicación' }, min: 0, max: 100 }
                            }
                        }
                    }));

                    // Gráfico de Radar
                    initChart('chartRadar', chartRadar, (ctx) => new Chart(ctx, {
                        type: 'radar',
                        data: {
                            labels: ['Las Torres', 'Tollocan', 'Comonfort', 'Tecnológico', 'C. Toluca', 'C. Metepec'],
                            datasets: [
                                { label: 'Gran Quinta', data: [9, 10, 8, 8, 7, 9], backgroundColor: 'rgba(245,158,11,0.2)', borderColor: '#F59E0B' },
                                { label: 'Promedio otros', data: [6, 5, 5, 4, 4, 6], backgroundColor: 'rgba(30,27,75,0.1)', borderColor: '#1E1B4B' }
                            ]
                        },
                        options: { responsive: true, maintainAspectRatio: false, scales: { r: { min: 0, max: 10, ticks: { stepSize: 2 } } } }
                    }));
                }, 500);

                return () => {
                    [chartTendencia, chartBurbujas, chartRadar].forEach(ref => { if (ref.current) ref.current.destroy(); ref.current = null; });
                };
            }, []);

            const togglePlay = () => {
                if (videoRef.current) {
                    if (isPlaying) videoRef.current.pause();
                    else videoRef.current.play();
                    setIsPlaying(!isPlaying);
                }
            };

            if (!cargado) return <div className="cargando">Preparando experiencia inmersiva...</div>;

            return (
                <div style={{ maxWidth: '500px', margin: '0 auto', padding: '15px' }}>
                    
                    {/* ===== ENCABEZADO ===== */}
                    <h1 style={{ fontSize: '32px', fontWeight: 'bold', marginBottom: '5px' }}>Lote 1 Gran Quinta</h1>
                    <p style={{ fontSize: '16px', color: '#666', marginBottom: '20px' }}>250m² frente a Casa Club • Metepec</p>

                    {/* ===== VIDEO ===== */}
                    <div className="video-container" style={{ marginBottom: '20px' }}>
                        <video ref={videoRef} src={`${baseUrl}video%20del%20fraccionamiento%20y%20terreno.mp4`} style={{ width: '100%', height: '100%', objectFit: 'cover' }} loop muted playsInline />
                        {!isPlaying && (
                            <button onClick={togglePlay} style={{ position: 'absolute', top: '50%', left: '50%', transform: 'translate(-50%, -50%)', background: 'rgba(0,0,0,0.6)', color: 'white', border: 'none', borderRadius: '50%', width: '60px', height: '60px', fontSize: '24px', cursor: 'pointer' }}>
                                ▶
                            </button>
                        )}
                    </div>

                    {/* ===== TARJETA DE PRECIO ===== */}
                    <div style={{ backgroundColor: '#0F172A', color: 'white', padding: '20px', borderRadius: '20px', marginBottom: '20px' }}>
                        <p style={{ fontSize: '14px', opacity: 0.7 }}>PRECIO TOTAL</p>
                        <p style={{ fontSize: '42px', fontWeight: 'bold', color: '#F59E0B', margin: '5px 0' }}>$2,875,000</p>
                        <p style={{ fontSize: '16px', opacity: 0.8 }}>$11,500/m²</p>
                    </div>

                    {/* ===== NUEVA SECCIÓN: SUSTITUCIÓN DE DEUDOR ===== */}
                    <div style={{ background: 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)', padding: '20px', borderRadius: '20px', marginBottom: '20px', color: 'white' }}>
                        <span className="badge">🔒 ESQUEMA SEGURO</span>
                        <h3 style={{ fontSize: '20px', fontWeight: 'bold', marginBottom: '10px' }}>Adquisición mediante Sustitución de Deudor</h3>
                        <p style={{ fontSize: '14px', lineHeight: '1.5', marginBottom: '10px' }}>
                            Este método te permite <strong>adquirir el inmueble asumiendo el crédito hipotecario existente</strong> ante Notario Público, sin necesidad de contratar un nuevo financiamiento.
                        </p>
                        <p style={{ fontSize: '13px', opacity: 0.9 }}>
                            ✅ Proceso rápido y transparente<br/>
                            ✅ Escrituración inmediata<br/>
                            ✅ Avalúo incluido
                        </p>
                    </div>

                    {/* ===== UBICACIÓN CON LINKS ===== */}
                    <div style={{ background: 'white', padding: '20px', borderRadius: '20px', boxShadow: '0 2px 8px rgba(0,0,0,0.1)', marginBottom: '20px' }}>
                        <h2 style={{ fontSize: '20px', fontWeight: 'bold', marginBottom: '15px' }}>📍 Ubicación Exacta</h2>
                        <p style={{ marginBottom: '15px' }}>Camino Real a Ocotitlán 601, Metepec
                            <a href="https://maps.google.com/?q=Camino+Real+a+Ocotitlán+601+Metepec" target="_blank" style={{ marginLeft: '10px', fontSize: '12px', color: '#2563eb' }}>[Ver mapa]</a>
                        </p>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
                            {[
                                { nombre: 'Las Torres', tiempo: '5\'' }, 
                                { nombre: 'Tollocan', tiempo: '4\'' }, 
                                { nombre: 'Tecnológico', tiempo: '8\'' }, 
                                { nombre: 'C. Metepec', tiempo: '7\'' }
                            ].map((lugar, i) => (
                                <a key={i} href={`https://maps.google.com/?q=${lugar.nombre}+Metepec`} target="_blank" style={{ background: '#F3F4F6', padding: '8px', borderRadius: '10px', textAlign: 'center', textDecoration: 'none', color: 'inherit' }}>
                                    {lugar.nombre}: {lugar.tiempo}
                                </a>
                            ))}
                        </div>
                    </div>

                    {/* ===== GALERÍA DE IMÁGENES ===== */}
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px', marginBottom: '20px' }}>
                        <img src={`${baseUrl}${images.aerial}`} alt="Vista aérea" style={{ aspectRatio: '1/1', borderRadius: '15px' }} onError={(e) => e.target.style.display='none'} />
                        <img src={`${baseUrl}${images.clubHouse}`} alt="Casa Club" style={{ aspectRatio: '1/1', borderRadius: '15px' }} onError={(e) => e.target.style.display='none'} />
                        <img src={`${baseUrl}${images.greenAreas}`} alt="Áreas Verdes" style={{ aspectRatio: '1/1', borderRadius: '15px' }} onError={(e) => e.target.style.display='none'} />
                        <img src={`${baseUrl}${images.street}`} alt="Calle" style={{ aspectRatio: '1/1', borderRadius: '15px' }} onError={(e) => e.target.style.display='none'} />
                    </div>

                    {/* ===== GRÁFICO DE TENDENCIA ===== */}
                    <div style={{ background: 'white', padding: '20px', borderRadius: '20px', marginBottom: '20px' }}>
                        <h3 style={{ fontSize: '18px', fontWeight: 'bold', marginBottom: '10px' }}>📈 Tendencia de Precios en Metepec</h3>
                        <div className="chart-container"><canvas id="chartTendencia"></canvas></div>
                        <p style={{ fontSize: '11px', marginTop: '10px', color: '#666' }}>
                            Fuente: Índice SHF de Precios de la Vivienda
                        </p>
                    </div>

                    {/* ===== NUEVO: ENLACE A ARTÍCULO SOBRE PLUSVALÍA ===== */}
                    <div style={{ background: '#F3F4F6', padding: '15px', borderRadius: '20px', marginBottom: '20px', textAlign: 'center' }}>
                        <p style={{ fontSize: '14px', marginBottom: '10px' }}>
                            📰 <strong>¿Por qué invertir en Metepec?</strong> Según El Financiero, Metepec es una de las zonas con mayor plusvalía del Estado de México.
                        </p>
                        <a href="https://www.elfinanciero.com.mx/tags/metepec/" target="_blank" style={{ display: 'inline-block', background: '#1E1B4B', color: 'white', padding: '10px 20px', borderRadius: '50px', textDecoration: 'none', fontSize: '14px', fontWeight: 'bold' }}>
                            Leer artículo en El Financiero →
                        </a>
                    </div>

                    {/* ===== GRÁFICO DE BURBUJAS ===== */}
                    <div style={{ background: 'white', padding: '20px', borderRadius: '20px', marginBottom: '20px' }}>
                        <h3 style={{ fontSize: '18px', fontWeight: 'bold', marginBottom: '10px' }}>💎 Comparativa de Fraccionamientos</h3>
                        <div className="chart-container"><canvas id="chartBurbujas"></canvas></div>
                        <div style={{ marginTop: '20px', fontSize: '12px' }}>
                            <p style={{ fontWeight: 'bold', marginBottom: '10px' }}>Verifica los datos:</p>
                            {fraccionamientos.map((f, i) => (
                                <div key={i} style={{ display: 'flex', justifyContent: 'space-between', padding: '5px 0', borderBottom: '1px solid #eee' }}>
                                    <span style={{ color: f.color, fontWeight: f.nombre.includes('Gran Quinta') ? 'bold' : 'normal' }}>{f.nombre}</span>
                                    <a href={f.link} target="_blank" style={{ color: '#2563eb', textDecoration: 'underline', fontSize: '10px' }}>Ver en Google</a>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* ===== GRÁFICO DE RADAR ===== */}
                    <div style={{ background: 'white', padding: '20px', borderRadius: '20px', marginBottom: '20px' }}>
                        <h3 style={{ fontSize: '18px', fontWeight: 'bold', marginBottom: '10px' }}>🕸️ Ventaja por Ubicación</h3>
                        <div className="chart-container"><canvas id="chartRadar"></canvas></div>
                    </div>

                    {/* ===== CONTACTO ===== */}
                    <div style={{ background: '#F59E0B', padding: '20px', borderRadius: '20px', textAlign: 'center', marginBottom: '20px' }}>
                        <h3 style={{ fontSize: '20px', fontWeight: 'bold', color: 'white', marginBottom: '15px' }}>¿Listo para invertir?</h3>
                        <a href="https://wa.me/5215546539933?text=Hola%20Aurelio,%20vi%20la%20ficha%20técnica%20del%20Lote%201%20en%20Gran%20Quinta%20y%20me%20interesa%20saber%20más%20sobre%20la%20sustitución%20de%20deudor.%20¿Podemos%20agendar%20una%20cita?" target="_blank" style={{ display: 'inline-block', background: '#25D366', color: 'white', padding: '15px 30px', borderRadius: '50px', textDecoration: 'none', fontWeight: 'bold' }}>
                            Contactar por WhatsApp
                        </a>
                        <p style={{ fontSize: '14px', color: 'white', marginTop: '15px' }}>
                            Aurelio Robles Pichardo - Asesor inmobiliario
                        </p>
                    </div>

                    {/* ===== PIE DE PÁGINA ===== */}
                    <div style={{ fontSize: '10px', color: '#999', textAlign: 'center', padding: '10px' }}>
                        <p>Fuentes: Inmuebles24, Vivanuncios, Propiedades.com, SHF, El Financiero, Google Maps (2025).</p>
                        <p>© 2026 Robles Ecosystem - Ficha técnica para inversionistas</p>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
